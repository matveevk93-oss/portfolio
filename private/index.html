function parseVimeo(v){
  var id="",hash="",clean=(v||"").split("?")[0];
  var m=clean.match(/vimeo\.com\/([0-9]+)(?:\/([a-f0-9]+))?/);
  if(m){id=m[1];hash=m[2]||"";}
  else if(/^[0-9]+$/.test(v)){id=v;}
  var oembed="https://vimeo.com/"+id+(hash?"/"+hash:"");
  var player="https://player.vimeo.com/video/"+id+(hash?"?h="+hash+"&":"?")+"autoplay=1&color=ffffff&title=0&byline=0&portrait=0&dnt=1";
  return {id:id,oembed:oembed,player:player};
}

var grid=document.getElementById("grid");
var expandedIdx=null,animating=false,items=[],thumbs={};
var activeFilter=null;
var contactMode=false;
var photoMode=false;
var shuffledPhotos=null; // перетасованный массив URL фоток, заполняется при первом открытии Photo

function buildFilters(){
  var cats=["Film","Commercial","Music"];
  var wrap=document.getElementById("filters");
  wrap.innerHTML="";
  cats.forEach(function(cat){
    var btn=document.createElement("button");
    btn.className="f-btn"+(activeFilter===cat&&!contactMode&&!photoMode?" active":"");
    btn.textContent=cat;
    btn.addEventListener("click",function(){
      if(contactMode||photoMode){
        contactMode=false;
        photoMode=false;
        activeFilter=cat;
        try{window.parent.postMessage({type:"portfolioScrollTop"},"*");}catch(e){}
        applyContact();
        applyPhoto();
        applyFilter();buildFilters();
        try{window.parent.postMessage({type:"portfolioFilter",filter:cat.toLowerCase()},"*");}catch(e){}
        return;
      }
      activeFilter=(activeFilter===cat)?null:cat;
      applyFilter();buildFilters();
      try{window.parent.postMessage({type:"portfolioFilter",filter:activeFilter?activeFilter.toLowerCase():""},"*");}catch(e){}
    });
    wrap.appendChild(btn);
  });
  // Кнопка Photo — рядом с категориями, отдельный режим (как About)
  var hasPhotos=(PHOTOS&&PHOTOS.length>0);
  if(hasPhotos){
    var pb=document.createElement("button");
    pb.className="f-btn"+(photoMode?" active":"");
    pb.textContent="Photo";
    pb.addEventListener("click",function(){
      photoMode=!photoMode;
      if(photoMode){
        if(expandedIdx!==null)collapse();
        activeFilter=null;
        contactMode=false;
        try{window.parent.postMessage({type:"portfolioScrollTop"},"*");}catch(e){}
      }
      applyContact();
      applyPhoto();
      applyFilter();
      buildFilters();
      try{window.parent.postMessage({type:"portfolioFilter",filter:photoMode?"photo":""},"*");}catch(e){}
    });
    wrap.appendChild(pb);
  }
  // Contact кнопка показывается только если есть mp4 фон или ссылки
  var hasContact=(CONTACT_DATA&&(CONTACT_DATA.bgMp4||(CONTACT_DATA.links&&CONTACT_DATA.links.length>0)));
  if(hasContact){
    var cb=document.createElement("button");
    cb.className="f-btn f-contact"+(contactMode?" active":"");
    cb.textContent="About";
    cb.addEventListener("click",function(){
      contactMode=!contactMode;
      if(contactMode){
        // выходим из expanded если открыт
        if(expandedIdx!==null)collapse();
        activeFilter=null;
        photoMode=false;
        try{window.parent.postMessage({type:"portfolioScrollTop"},"*");}catch(e){}
      }
      applyContact();
      applyPhoto();
      applyFilter();
      buildFilters();
    });
    wrap.appendChild(cb);
  }
  if(typeof updateFiltersLayout==="function")updateFiltersLayout();
}

function applyContact(){
  var screen=document.getElementById("contact-screen");
  var g=document.getElementById("grid");
  var flt=document.getElementById("filters");
  if(!screen)return;
  if(contactMode){
    function escHtml(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
    // Имя + роль
    var nameEl=screen.querySelector("#contact-name .cn-name");
    var roleEl=screen.querySelector("#contact-name .cn-role");
    if(nameEl)nameEl.textContent=CONTACT_DATA.name||"";
    if(roleEl){

function updateContactMobile(){
  var screen=document.getElementById("contact-screen");
  if(!screen||!screen.classList.contains("active"))return;
  var w=document.body.offsetWidth||screen.offsetWidth||window.innerWidth||800;
  var isMob=w<700;
  screen.classList.toggle("mobile",isMob);
  var flt=document.getElementById("filters");
  var vh=reelViewportH||lbViewportH||(window.innerHeight||700);
  var fh=flt?flt.offsetHeight:0;
  var baseH=Math.max(400,vh-fh);
  if(isMob){
    // Mobile: экран может расти под контент. CSS делает height:auto !important.
    screen.style.height="";
    screen.style.minHeight=baseH+"px";
  } else {
    // Desktop: жёсткая высота viewport
    screen.style.height=baseH+"px";
    screen.style.minHeight="";
  }
}

// ── PHOTO GRID: prelaod + smart shuffle ──────────────
// Загружаем все картинки в памяти (без вставки в DOM), считаем aspect ratios.
// Колбэк вызывается ровно один раз — когда все картинки либо загрузились, либо упали в onerror.
var __phRatiosCache=null;
function preloadAspectRatios(urls,callback){
  if(__phRatiosCache){callback(__phRatiosCache);return;}
  if(!urls||!urls.length){__phRatiosCache=[];callback([]);return;}
  var ratios=new Array(urls.length);
  var done=0;
  urls.forEach(function(url,i){
    var im=new Image();
    var settle=function(){
      if(ratios[i]!==undefined)return; // защита от двойного срабатывания
      ratios[i]=(im.naturalWidth&&im.naturalHeight)?im.naturalWidth/im.naturalHeight:1;
      done++;
      if(done===urls.length){__phRatiosCache=ratios;callback(ratios);}
    };
    im.onload=settle;
    im.onerror=settle;
    im.src=url;
    // Если из кеша — onload может не выстрелить
    if(im.complete&&im.naturalWidth)setTimeout(settle,0);
  });
  // Аварийный таймаут — если что-то зависнет на 10с, всё равно показываем что есть
  setTimeout(function(){
    if(done<urls.length){
      for(var i=0;i<urls.length;i++)if(ratios[i]===undefined)ratios[i]=1;
      __phRatiosCache=ratios;
      callback(ratios);
    }
  },10000);
}

// Решение «как разложить» для каждой фотки. Симулирует CSS Grid с auto-flow: dense.
// Возвращает массив { placement: "default"|"right", expandFull: boolean }.
// Правила:
//  - wide-2 хочет направо (по хешу), если есть свободная узкая после неё → может встать в col 2-3
//  - если wide-2 оставлена слева, но в её ряду в col 3 НИКТО не встанет → апгрейдим её в wide-3 (на всю ширину)
//  - если wide-2 направо, но в её ряду в col 1 никто не встанет → тоже апгрейд в wide-3
function decidePlacements(ratios){
  var n=ratios.length;
  var COLS=3;
  // Хеш «хочет ли направо» — murmur3 финализатор
  function wantsRight(i){
    var hh=i;
    hh=((hh^(hh<<16))*0x85ebca6b)>>>0;
    hh=((hh^(hh>>>13))*0xc2b2ae35)>>>0;
    hh=(hh^(hh>>>16))>>>0;
    return (hh&1)===1;
  }
  // Шаг 1: предварительно решаем placement (default/right) с резервацией узких
  var placements=new Array(n);
  for(var i=0;i<n;i++)placements[i]="default";
  var narrows=[];
  for(var i=0;i<n;i++)if(ratios[i]<1.4)narrows.push(i);
  var nextNarrow=0;
  for(var i=0;i<n;i++){
    var r=ratios[i];
    if(r>=1.4&&r<2.0&&wantsRight(i)){
      while(nextNarrow<narrows.length&&narrows[nextNarrow]<=i)nextNarrow++;
      if(nextNarrow<narrows.length){
        placements[i]="right";
        nextNarrow++;
      }
    }
  }
  // Шаг 2: симулируем раскладку и считаем сколько RowUnits занимает каждая ячейка в каждом столбце.
  // RowUnit = условная строка ~ширине колонки. Высота ячейки = colspan / ratio (round).
  // Матрица — массив колонок, каждая = массив "занятых RowUnits" в виде сегментов [from, to, cellIdx].
  // Достаточно посчитать для каждой ячейки её "row start" и "row end".
  // Имитируем dense: для каждой ячейки в порядке источника ищем самый ранний row, где helf 2-3 свободных col подряд.
  function colHeight(col,occ){
    var max=0;
    for(var k=0;k<occ[col].length;k++)if(occ[col][k]>max)max=occ[col][k];
    return max;
  }
  // Каждая ячейка получает {rowStart, rowEnd, colStart, colEnd}
  var slots=new Array(n);
  // occ[col] = текущая "высота" заполнения колонки в RowUnits
  var occ=[0,0,0];
  function fits(rowStart,colStart,colSpan,rowSpan){
    for(var c=colStart;c<colStart+colSpan;c++){
      if(occ[c]>rowStart)return false;
    }
    return true;
  }
  for(var i=0;i<n;i++){
    var r=ratios[i];
    var colSpan;
    if(r>=2.0)colSpan=3;
    else if(r>=1.4)colSpan=2;
    else colSpan=1;
    var rowSpan=Math.max(1,Math.round(colSpan/r));
    // Кандидатные стартовые позиции
    var candidates=[];
    if(colSpan===3){
      candidates.push(0);
    } else if(colSpan===2){
      // wide-2: предпочтение по placement, но если не вмещается рано — попробуем другое место
      if(placements[i]==="right")candidates.push(1,0);
      else candidates.push(0,1);
    } else {
      candidates.push(0,1,2);
    }
    // Найти минимальный rowStart среди кандидатов
    var bestRow=Infinity,bestCol=0;
    for(var ci=0;ci<candidates.length;ci++){
      var col=candidates[ci];
      // Минимальный row где этот col и следующие colSpan-1 пустые
      var row=0;
      for(var c=col;c<col+colSpan;c++)if(occ[c]>row)row=occ[c];
      if(row<bestRow){bestRow=row;bestCol=col;}
    }
    slots[i]={rowStart:bestRow,rowEnd:bestRow+rowSpan,colStart:bestCol,colEnd:bestCol+colSpan,colSpan:colSpan,upgraded:false};
    // Обновить occ
    for(var c=bestCol;c<bestCol+colSpan;c++)occ[c]=bestRow+rowSpan;
    // Обновить placement по фактическому положению
    if(colSpan===2)placements[i]=(bestCol===1)?"right":"default";
  }
  // Шаг 3: найти "осиротевшие" wide-2 — те, у которых в их ряду соседняя колонка пустая на всю их высоту.
  // Проверяем: для wide-2 в col 0-1 (default) есть ли в [rowStart, rowEnd) НИКТО в col 2.
  // Для wide-2 в col 1-2 (right) — есть ли в [rowStart, rowEnd) НИКТО в col 0.
  // "Никто" = ни одна другая ячейка не покрывает этот (col,row) range.
  for(var i=0;i<n;i++){
    var s=slots[i];
    if(s.colSpan!==2)continue;
    var neighbor=(s.colStart===0)?2:0;
    var hasNeighbor=false;
    for(var j=0;j<n;j++){
      if(j===i)continue;
      var t=slots[j];
      // t покрывает (neighbor, [s.rowStart, s.rowEnd))?
      if(t.colStart<=neighbor&&t.colEnd>neighbor&&t.rowStart<s.rowEnd&&t.rowEnd>s.rowStart){
        hasNeighbor=true;break;
      }
    }
    if(!hasNeighbor)s.upgraded=true; // апгрейд до wide-3
  }
  // Шаг 4: построить финальный результат
  var result=new Array(n);
  for(var i=0;i<n;i++){
    result[i]={placement:placements[i],expandFull:slots[i].upgraded};
  }
  return result;
}

function applyPhoto(){
  var pg=document.getElementById("photo-grid");
  var g=document.getElementById("grid");
  if(!pg)return;
  if(photoMode){
    if(g)g.style.display="none";
    pg.classList.add("active");
    if(!pg.dataset.built){
      pg.dataset.built="1"; // ставим сразу чтобы повторный applyPhoto не запустил второй preload
      pg.innerHTML="<div id=\"photo-loading\">Загрузка...</div>";
      // Случайный порядок при первом открытии страницы фото. Fisher-Yates на копии PHOTOS.
      // Перетасованный массив фиксируется в shuffledPhotos — между переключениями режимов и ресайзом
      // порядок не меняется (только при перезагрузке страницы).
      shuffledPhotos=(PHOTOS||[]).slice();
      for(var sh=shuffledPhotos.length-1;sh>0;sh--){
        var sj=Math.floor(Math.random()*(sh+1));
        var st=shuffledPhotos[sh];shuffledPhotos[sh]=shuffledPhotos[sj];shuffledPhotos[sj]=st;
      }
      preloadAspectRatios(shuffledPhotos,function(ratios){
        var placements=decidePlacements(ratios);
        buildPhotoGrid(ratios,placements);
        updatePhotoCols();
        requestAnimationFrame(function(){requestAnimationFrame(function(){
          sendHeight();
          setTimeout(sendHeight,300);
          setTimeout(sendHeight,700);
          setTimeout(sendHeight,1500);
        });});
      });
    } else {
      updatePhotoCols();
    }
  } else {
    pg.classList.remove("active");
    if(g&&!contactMode)g.style.display="";
  }
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    sendHeight();
    setTimeout(sendHeight,300);
    setTimeout(sendHeight,700);
    setTimeout(sendHeight,1500);
    setTimeout(sendHeight,3000);
    setTimeout(sendHeight,5000);
  });});
}

function buildPhotoGrid(ratios,placements){
  var pg=document.getElementById("photo-grid");
  if(!pg)return;
  pg.innerHTML="";
  ratios=ratios||[];
  placements=placements||[];
  // Используем перетасованный порядок, если он есть (после shuffle при applyPhoto).
  // Fallback на PHOTOS — на случай вызова из других мест.
  var srcList=shuffledPhotos||PHOTOS||[];
  srcList.forEach(function(url,i){
    var cell=document.createElement("div");
    cell.className="photo-cell";
    var img=document.createElement("img");
    img.alt="";
    img.dataset.photoIdx=i;
    var pl=placements[i]||{placement:"default",expandFull:false};
    img.dataset.placement=pl.placement||"default";
    img.dataset.expandFull=pl.expandFull?"1":"0";
    img.loading="lazy";
    var onReady=function(){
      applyPhotoSpan(cell,img);
      // sendHeight() вызовется из resizePhotoCell после установки span,
      // чтобы getBoundingClientRect видел актуальную высоту grid
    };
    img.addEventListener("load",onReady);
    img.addEventListener("error",function(){schedulePhotoHeight();});
    img.src=url;
    // Если картинка уже в кеше (что вероятно после preloadAspectRatios) — load может не выстрелить
    if(img.complete&&img.naturalWidth)setTimeout(onReady,0);
    cell.appendChild(img);
    pg.appendChild(cell);
  });
}

// RAF-throttled sendHeight для photo grid:
// 30 фоток → 30 onload событий → без throttle получили бы 30 sendHeight в один кадр.
var _phHeightTimer=null;
function schedulePhotoHeight(){
  if(_phHeightTimer)return;
  _phHeightTimer=requestAnimationFrame(function(){
    _phHeightTimer=null;
    sendHeight();
  });
}

function getPhotoCols(){
  var pg=document.getElementById("photo-grid");
  if(!pg)return 3;
  var w=pg.offsetWidth||grid.offsetWidth||document.body.offsetWidth||800;
  if(w<540)return 2;
  return 3;
}

function applyPhotoSpan(cell,img){
  if(!img.naturalWidth||!img.naturalHeight)return;
  var ratio=img.naturalWidth/img.naturalHeight;
  var cols=getPhotoCols();
  cell.classList.remove("wide-2","wide-3");
  cell.style.gridColumn=""; // сброс inline-стиля (мог быть от прошлого вызова при ресайзе колонок)
  var expand=(img.dataset.expandFull==="1");
  // Соотношения сторон: <1.4 — узкое/вертикальное, 1.4-2.0 — широкое, >=2.0 — очень широкое
  if(cols>=3){
    if(ratio>=2.0)cell.classList.add("wide-3");
    else if(ratio>=1.4){
      // Если в раскладке у этой wide-2 не было бы соседа — растянуть на всю ширину
      if(expand)cell.classList.add("wide-3");
      else{
        cell.classList.add("wide-2");
        if(img.dataset.placement==="right")cell.style.gridColumn="2 / span 2";
      }
    }
  } else if(cols===2){
    if(ratio>=1.4)cell.classList.add("wide-2");
    // в 2-колоночном режиме wide-2 занимает всю ширину, placement/expand не применяется
  }
  // После применения wide-класса ширина ячейки меняется → нужен reflow перед измерением
  requestAnimationFrame(function(){resizePhotoCell(cell,img);});
}

function resizePhotoCell(cell,img){
  var pg=document.getElementById("photo-grid");
  if(!pg)return;
  var cs=window.getComputedStyle(pg);
  var rowH=parseFloat(cs.gridAutoRows)||4;
  var gap=parseFloat(cs.rowGap||cs.gap)||0;
  // getBoundingClientRect форсит layout sync — высота актуальная
  var h=img.getBoundingClientRect().height;
  if(!h)return;
  var rows=Math.ceil((h+gap)/(rowH+gap));
  cell.style.gridRowEnd="span "+rows;
  // Теперь span установлен — можно сообщить родителю новую высоту grid
  schedulePhotoHeight();
}

function updatePhotoCols(){
  var pg=document.getElementById("photo-grid");
  if(!pg)return;
  var n=getPhotoCols();
  pg.style.gridTemplateColumns="repeat("+n+",1fr)";
  // Пересчитать span классы и row-span для каждой ячейки
  Array.prototype.forEach.call(pg.querySelectorAll(".photo-cell"),function(cell){
    var img=cell.querySelector("img");
    if(img&&img.naturalWidth)applyPhotoSpan(cell,img);
  });
}

function updateFiltersLayout(){
  var flt=document.getElementById("filters");
  if(!flt)return;
  // На узких экранах включаем nowrap + меньший шрифт/gap чтобы все кнопки помещались в одну строку
  var w=document.body.offsetWidth||window.innerWidth||800;
  flt.classList.toggle("compact",w<540);
}

function isMobile(){return grid.offsetWidth<540;}
function isTablet(){
  // Touch device with width >= 540 (iPad portrait/landscape, not iPhone, not desktop).
  if(grid.offsetWidth<540)return false;
  try{return !!(window.matchMedia&&window.matchMedia("(pointer: coarse)").matches);}catch(_){return false;}
}

function updateGridCols(){
  var mob=isMobile();
  var tabletReel=!mob&&isTablet()&&activeFilter;
  if(mob){grid.style.gridTemplateColumns="1fr";}
  else if(tabletReel){grid.style.gridTemplateColumns="1fr";}
  else{var c=activeFilter?((CAT_COLS&&CAT_COLS[activeFilter])||COLS):COLS;grid.style.gridTemplateColumns="repeat("+c+",1fr)";}
  // Сброс высоты span-full на мобильной ширине — @media в iframe не срабатывает (читает родительское окно)
  items.forEach(function(el){
    if(!el||!el.classList.contains("span-full"))return;
    var tw=el.querySelector(".thumb-wrap");
    if(!tw)return;
    if(mob){tw.style.aspectRatio="16/9";tw.style.height="auto";}
    else{tw.style.aspectRatio="";tw.style.height="";}
  });
  // Галерея в открытом проекте: 1 колонка на мобиле, иначе по настройкам видео
  var vpg=document.getElementById("vp-gallery");
  if(vpg&&expandedIdx!==null){
    var ev=videos[expandedIdx];
    var vgc=mob?1:((ev&&ev.galleryCols)||2);
    vpg.style.gridTemplateColumns="repeat("+vgc+",1fr)";
  }
}

function applyFilter(){
  updateGridCols();
  items.forEach(function(el,i){
    if(!el)return;
    var v=videos[i];
    if(activeFilter===null){el.style.display=v.hideOnMain?"none":"";}
    else{
      var cats=v.categories||[];
      el.style.display=(cats.indexOf(activeFilter)!==-1)?"":"none";
    }
  });
  requestAnimationFrame(function(){requestAnimationFrame(function(){sendHeight();setTimeout(sendHeight,300);setTimeout(sendHeight,700);});});
  if(isReelMode()&&!animating){reelIdx=0;reelDeltaAccum=0;try{window.parent.postMessage({type:"portfolioReelRequest"},"*");}catch(ex){}}
  else if(!isReelMode()){items.forEach(function(el){if(!el)return;el.classList.remove("reel-active");var vid=el.querySelector(".hover-video");if(vid){vid.pause();vid.currentTime=0;}});}
}

if(window.ResizeObserver){
  new ResizeObserver(function(){updateGridCols();updateContactMobile();updatePhotoCols();}).observe(grid);
  var _csForObs=document.getElementById("contact-screen");
  if(_csForObs){new ResizeObserver(function(){updateContactMobile();}).observe(_csForObs);}
  var _pgForObs=document.getElementById("photo-grid");
  if(_pgForObs){new ResizeObserver(function(){updatePhotoCols();}).observe(_pgForObs);}
  // Отдельный observer на body — он видим всегда (в отличие от grid при photo/contact режимах)
  new ResizeObserver(function(){updateFiltersLayout();}).observe(document.body);
}

function buildItems(){
  grid.innerHTML="";items=[];
  videos.forEach(function(v,idx){
    if(v.hiddenFromGrid){items.push(null);return;}
    var el=document.createElement("div");
    el.className="item"+(v.spanFull?" span-full":"");
    if(v.spanFull&&v.spanHeight){el.style.setProperty("--span-h",v.spanHeight+"px");}
    el.style.width="";
    var ratio=v.ratio||56.25;
    var thumbHtml=v.customThumb
      ?"<img class=\"brick-img\" src=\""+v.customThumb+"\" alt=\""+v.title+"\">"
      :"<div class=\"thumb-ph\" style=\"width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#444;padding:10px;text-align:center;\">"+v.title+"</div>";
    el.innerHTML=
      "<div class=\"thumb-wrap\">"+thumbHtml+(v.mp4?"<video class=\"hover-video\" src=\""+v.mp4+"\" muted loop playsinline preload=\"auto\"></video>":"")+"</div>"
      +"<div class=\"brick-overlay\"><div class=\"brick-info\"><div class=\"brick-title\">"+v.title+"</div>"+(v.client?"<div class=\"brick-client\">"+v.client+"</div>":"")+"</div></div>";
    el.addEventListener("click",function(e){if(animating)return;if(expandedIdx===idx)collapse();else expand(idx);});
    el.addEventListener("touchstart",function(){
      if(isReelMode())return;
      // Сбрасываем превью на других карточках
      items.forEach(function(other){
        if(!other||other===el)return;
        if(other.classList.contains("touch-active")){
          other.classList.remove("touch-active");
          var ov=other.querySelector(".hover-video");
          if(ov&&!other.classList.contains("reel-active")){ov.pause();ov.currentTime=0;}
        }
      });
      // Активируем превью на этой карточке
      el.classList.add("touch-active");
      var vid=el.querySelector(".hover-video");
      if(vid)vid.play().catch(function(){});
    },{passive:true});
    el.addEventListener("mouseenter",function(){if(isReelMode())return;var vid=el.querySelector(".hover-video");if(vid)vid.play().catch(function(){});});
    el.addEventListener("mouseleave",function(){
      var vid=el.querySelector(".hover-video");if(!vid)return;
      if(isReelMode()){var vis=reelVisible();if(vis[reelIdx]===el)return;}
      vid.pause();vid.currentTime=0;
    });
    grid.appendChild(el);items.push(el);
    if(!v.customThumb&&v.vimeoId)loadThumb(v.vimeoId,idx);
  });
}

function expand(idx){
  if(animating)return;
  animating=true;expandedIdx=idx;
  var _el0=items[idx];
  var _cols=activeFilter?((CAT_COLS&&CAT_COLS[activeFilter])||COLS):COLS;
  if(_el0){
    var _absY0=getElAbsY(_el0);
    if(_cols===1){
      reelSavedAnchor=_absY0+_el0.offsetHeight/2;

function isReelMode(){

function reelPlayFocused(){
  var vis=reelVisible();

  vis.forEach(function(el,i){
    var vid=el.querySelector(".hover-video");
    if(i===reelIdx){
      if(vid){
        vid.pause();
        var doPlay=function(){
          if(gen!==reelGen)return;
          el.classList.add("reel-active");
          vid.play().catch(function(){});
        };
        if(vid.readyState>=2&&vid.currentTime===0){
          requestAnimationFrame(doPlay);
        } else {
          vid.currentTime=0;
          var fired=false;
          var onReady=function(){
            if(fired)return;fired=true;
            vid.removeEventListener("seeked",onReady);
            doPlay();
          };
          vid.addEventListener("seeked",onReady);
          setTimeout(function(){if(!fired){fired=true;vid.removeEventListener("seeked",onReady);doPlay();}},300);
        }
      } else {
        el.classList.add("reel-active");

    return;
  }
  reelIdx=clamped;

    target=Math.max(0,Math.round(reelIframeTop-20));

function reelWheelHandler(e){

  if(!isReelMode())return;
  e.preventDefault();
  var now=Date.now();
  if(now-reelLastWheel>180){reelBusy=false;reelDeltaAccum=0;}
  reelLastWheel=now;
  if(reelBusy){reelDeltaAccum=0;return;}
  reelDeltaAccum+=e.deltaY;
  if(Math.abs(reelDeltaAccum)<15)return;
  var d=reelDeltaAccum>0?1:-1;

  reelBusy=true;

  reelTimer=setTimeout(function(){reelBusy=false;reelDeltaAccum=0;},1500);

// Universal wheel forwarder: forward all wheel deltas to parent for smooth easing in Velo.
// Chrome wheel propagation works natively, but to make scroll feel consistent across browsers
// we route everything through the smooth scroller. Delta is clamped to normalize between
// Safari trackpad (~5px/tick) and Chrome mouse wheel (~100px/tick).
(function(){
  document.addEventListener("wheel",function(e){
    if(isReelMode())return;
    if(lbIsOpen){e.preventDefault();return;}
    e.preventDefault();
    var dy=e.deltaY;
    if(e.deltaMode===1)dy*=32;
    else if(e.deltaMode===2)dy*=window.innerHeight;
    // Clamp per-tick delta — keeps Chrome from skipping past the smoothing entirely
    var MAX=80;
    if(dy>MAX)dy=MAX;else if(dy<-MAX)dy=-MAX;
    try{window.parent.postMessage({type:"portfolioWheel",deltaY:dy},"*");}catch(_){}
  },{passive:false});
})();

  var flt=document.getElementById("filters");
  if(s){
    s.style.opacity="0";
    setTimeout(function(){
      if(s.parentNode)s.parentNode.removeChild(s);
      if(g){g.style.height="auto";g.style.overflow="";g.style.visibility="visible";requestAnimationFrame(function(){g.style.opacity="1";});}
      if(flt){flt.style.height="auto";flt.style.overflow="";flt.style.visibility="visible";requestAnimationFrame(function(){flt.style.opacity="1";});}
      sendHeight();
      setTimeout(sendHeight,700);
    },450);
  }
}
(function(){
  var start=Date.now(),MIN=1200;
  function tryHide(){
    if(hidden)return;
    var wait=Math.max(0,MIN-(Date.now()-start));
    setTimeout(doHide,wait);
  }
  var imgs=Array.from(document.querySelectorAll(".grid .brick-img"));
  var vids=Array.from(document.querySelectorAll(".grid .hover-video"));
  var total=imgs.length+vids.length,done=0;
  function tick(){done++;if(done>=total)tryHide();}
  imgs.forEach(function(img){
    if(img.complete&&img.naturalWidth>0){done++;}
    else{img.addEventListener("load",tick);img.addEventListener("error",tick);}
  });
  vids.forEach(function(vid){
    if(vid.readyState>=2){done++;}
    else{vid.addEventListener("canplay",tick);vid.addEventListener("error",tick);}
  });
  if(done>=total)tryHide();
  setTimeout(function(){if(!hidden)doHide();},6000);
})();


function sendHeight(){
  var cs=document.getElementById("contact-screen");
  var pg=document.getElementById("photo-grid");
  var target;
  if(photoMode&&pg&&pg.classList.contains("active"))target=pg;
  else if(cs&&cs.classList.contains("active"))target=cs;
  else target=document.getElementById("grid");
  if(!target)return;
  var rectBottom=Math.ceil(target.getBoundingClientRect().bottom+window.scrollY+6);
  // Для photo grid дополнительно учитываем scrollHeight + offsetTop
  // (getBoundingClientRect иногда отстаёт когда grid-row-end только что обновился)
  var h=rectBottom;
  if(photoMode&&target===pg){
    var scrollH=target.offsetTop+target.scrollHeight+6;
    if(scrollH>h)h=scrollH;
  }
  if(isReelMode()){
    // Reel mode: pad bottom by ~half viewport so the last card can be snap-centered.
    // Without this, maxScroll on the parent clamps the target and the last card lands at iframe bottom.
    var vh=reelViewportH||lbViewportH||(window.innerHeight||700);
    h+=Math.ceil(vh/2);
  }
  try{window.parent.postMessage({type:"portfolioHeight",height:h},"*");}catch(e){}
}
setTimeout(sendHeight,200);
setTimeout(sendHeight,1500);
</script>
